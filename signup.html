<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Placements - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&family=Space+Grotesk:wght=500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        display: ['"Space Grotesk"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#eaeded] text-[#111111] antialiased font-sans flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-md max-w-md w-full border border-slate-200">
        <div class="text-center mb-6">
            <div class="flex items-baseline justify-center">
                <span class="text-3xl font-bold text-[#ff9900] tracking-tight italic">amazon</span>
                <span class="text-lg font-semibold text-slate-700 ml-0.5 tracking-wide">placements</span>
            </div>
            <p class="text-xs text-slate-500 mt-1 font-medium font-display">UK T-Level Portal Registration</p>
        </div>

        <div id="alert-box" class="hidden mb-4 p-3 rounded-xl text-xs font-medium border"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Your Full Name</label>
                <input id="signup-name" type="text" class="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900] transition" placeholder="Taylor Brooke" />
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Choose Username</label>
                <input id="signup-username" type="text" class="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900] transition" placeholder="taylor123" />
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wide">Password</label>
                <input id="signup-password" type="password" class="w-full px-4 py-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-[#ff9900] transition" placeholder="••••••••" />
            </div>

            <button onclick="executeRegistration()" class="w-full bg-[#ff9900] hover:bg-[#e48900] text-slate-900 py-2.5 rounded-xl font-bold text-xs transition tracking-wide cursor-pointer shadow-xs">
                Create Portal Profile
            </button>
        </div>

        <div class="mt-6 pt-4 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-500">
                Already have a placement registry account? 
                <a href="./index.html" class="text-[#c45500] font-bold hover:underline ml-1">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        function executeRegistration() {
            const name = document.getElementById('signup-name').value.trim();
            const user = document.getElementById('signup-username').value.trim().toLowerCase();
            const pass = document.getElementById('signup-password').value.trim();
            const alertBox = document.getElementById('alert-box');

            // Reset dynamic alert status
            alertBox.className = "hidden mb-4 p-3 rounded-xl text-xs font-medium border";

            // Basic validation check
            if (!name || !user || !pass) {
                alertBox.textContent = "Please fill in all registration fields.";
                alertBox.classList.remove('hidden');
                alertBox.classList.add('bg-red-50', 'border-red-200', 'text-red-800');
                return;
            }

            // Save data locally under the precise keys expected by your main.js file
            const profileData = { fullName: name, username: user, password: pass };
            localStorage.setItem(`user_${user}`, JSON.stringify(profileData));

            // Set up success alert configuration
            alertBox.textContent = "Account successfully registered! Redirecting to login hub...";
            alertBox.classList.remove('hidden');
            alertBox.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-800');

            // Hold window view briefly, then push them directly to index.html login page
            setTimeout(() => {
                window.location.href = './index.html';
            }, 1800);
        }
    </script>
</body>
</html>
